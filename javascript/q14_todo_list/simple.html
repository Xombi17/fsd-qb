    <script>
        function addtask() {
            let task = document.getElementById("task").value;
            let li = document.createElement("li");
            li.innerText = task +"<button onclick='this.parentNode.remove()'>Delete</button>";
            document.getElementById("tasklist").appendChild(li);
        }
    </script>
