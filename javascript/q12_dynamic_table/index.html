<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Q12 - Dynamic Table Generator</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main>
        <h1>Dynamic Table Generator</h1>
        <form id="entryForm">
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter name" required />

            <label for="age">Age:</label>
            <input type="number" id="age" min="1" placeholder="Enter age" required />

            <label for="department">Department:</label>
            <input type="text" id="department" placeholder="Enter department" required />

            <button type="submit">Submit</button>
        </form>

        <section id="tableSection" class="hidden">
            <h2>Records</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Department</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
