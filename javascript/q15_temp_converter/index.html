<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Temperature Converter</h1>

  <form id="tempForm">

    <label for="tempValue">Enter Temperature:</label>
    <br>
    <input type="number" id="tempValue" placeholder="e.g. 100" step="any" required />

    <br><br>

    <fieldset>
      <legend>Select Conversion:</legend>

      <input type="radio" name="convType" value="CtoF" checked />
      <label>Celsius to Fahrenheit</label>

      <br><br>

      <input type="radio" name="convType" value="FtoC" />
      <label>Fahrenheit to Celsius</label>

    </fieldset>

    <br>
    <br>
    

        
    <button type="submit">Convert</button>

  </form>

  <p id="result"></p>

  <script src="script.js"></script>
</body>
</html>
