<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Q19 - Simple Calculator</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main>
        <h1>Simple Calculator</h1>
        <section class="calculator" aria-label="Calculator">
            <output id="display">0</output>
            <div class="buttons">
                <button class="btn-clear" onclick="clearDisplay()">C</button>
                <button class="btn-op" onclick="deleteLast()">⌫</button>
                <button class="btn-op" onclick="appendToDisplay('%')">%</button>
                <button class="btn-op" onclick="appendToDisplay('/')">÷</button>

                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button class="btn-op" onclick="appendToDisplay('*')">×</button>

                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button class="btn-op" onclick="appendToDisplay('-')">−</button>

                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button class="btn-op" onclick="appendToDisplay('+')">+</button>

                <button class="btn-zero" onclick="appendToDisplay('0')">0</button>
                <button onclick="appendToDisplay('.')">.</button>
                <button class="btn-equals" onclick="calculate()">=</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
