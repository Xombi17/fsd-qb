<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Q16 - Number Statistics</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main>
        <h1>Number Statistics</h1>
        <form id="numForm">
            <label for="count">How many numbers?</label>
            <input type="number" id="count" min="1" placeholder="e.g. 5" required />
            <button type="button" id="generateBtn">Generate Fields</button>
        </form>

        <form id="numbersForm" class="hidden">
            <div id="numberInputs"></div>
            <button type="submit">Calculate</button>
        </form>

        <section id="result" class="hidden">
            <h2>Statistics</h2>
            <p>Maximum: <span id="max"></span></p>
            <p>Minimum: <span id="min"></span></p>
            <p>Average: <span id="avg"></span></p>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
