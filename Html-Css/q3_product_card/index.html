<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card Layout</title>
    <!-- Linking external CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Flex container to center the product card -->
    <div class="card-container">

        <!-- Product Card -->
        <div class="product-card">
            <!-- Product image at the top -->
            <img src="https://via.placeholder.com/300x200" alt="Product Image">

            <div class="product-info">
                <!-- Product title -->
                <h2>Wireless Headphones</h2>

                <!-- Product description -->
                <p>High quality noise-canceling wireless headphones with up to 40 hours of battery life.</p>

                <p class="price">$199.99</p>

                <!-- Buy Now button -->
                <button class="buy-button">Buy Now</button>
            </div>
        </div>

    </div>
</body>

</html>
