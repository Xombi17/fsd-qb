<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Table</title>
    <!-- Linking external CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Table container -->
    <div class="table-container">
        <!-- Student Result Table -->
        <table>
            <!-- Table Caption -->
            <caption>Computer Engineering Semester IV Results</caption>

            <thead>
                <tr>
                    <th>Roll No</th>
                    <th>Student Name</th>
                    <th>Physics</th>
                    <th>Chemistry</th>
                    <th>Maths</th>
                    <th>Total %</th>
                </tr>
            </thead>

            <tbody>
                <!-- Minimum 5 student records -->
                <tr>
                    <td>101</td>
                    <td>Alice Smith</td>
                    <td>85</td>
                    <td>90</td>
                    <td>88</td>
                    <td>87.6%</td>
                </tr>
                <tr>
                    <td>102</td>
                    <td>Bob Johnson</td>
                    <td>78</td>
                    <td>82</td>
                    <td>75</td>
                    <td>78.3%</td>
                </tr>
                <tr>
                    <td>103</td>
                    <td>Charlie Brown</td>
                    <td>92</td>
                    <td>95</td>
                    <td>90</td>
                    <td>92.3%</td>
                </tr>
                <tr>
                    <td>104</td>
                    <td>David Miller</td>
                    <td>65</td>
                    <td>70</td>
                    <td>68</td>
                    <td>67.6%</td>
                </tr>
                <tr>
                    <td>105</td>
                    <td>Eve Davis</td>
                    <td>88</td>
                    <td>85</td>
                    <td>92</td>
                    <td>88.3%</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
