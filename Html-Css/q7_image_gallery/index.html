<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <!-- Linking external CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="gallery-wrapper">
        <h1 style="text-align: center; color: #333;">College Campus Gallery</h1>
        <!-- Image gallery section -->
        <section class="image-gallery">
            <!-- Figure and Figcaption required -->
            <figure class="gallery-item">
                <img src="https://via.placeholder.com/400x300?text=Campus+1" alt="College Building">
                <figcaption>Main Building</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://via.placeholder.com/400x300?text=Campus+2" alt="Library">
                <figcaption>Central Library</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://via.placeholder.com/400x300?text=Campus+3" alt="Auditorium">
                <figcaption>Auditorium</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://via.placeholder.com/400x300?text=Campus+4" alt="Cafeteria">
                <figcaption>College Cafeteria</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://via.placeholder.com/400x300?text=Campus+5" alt="Sports Ground">
                <figcaption>Sports Ground</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://via.placeholder.com/400x300?text=Campus+6" alt="Labs">
                <figcaption>Computer Science Labs</figcaption>
            </figure>
        </section>
    </div>
</body>

</html>
